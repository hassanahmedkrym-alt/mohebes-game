<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المحيبس </title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #000;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen { display: flex; }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        .img-container img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        .hotspot { position: absolute; cursor: pointer; z-index: 150; }
        .start-btn { bottom: 8%; left: 35%; width: 30%; height: 15%; }
        .tak-btn { bottom: 10%; left: 8%; width: 35%; height: 15%; }
        .jeeb-btn { bottom: 10%; right: 8%; width: 35%; height: 15%; }
        .retry-btn { bottom: 5%; left: 32%; width: 36%; height: 10%; }

        /* --- حاوية أزرار التنقل --- */
        .nav-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 250;
        }

        .nav-btn {
            padding: 10px 20px;
            background: linear-gradient(145deg, #d35400, #e67e22);
            color: white;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .nav-btn:hover { transform: scale(1.05); background: #e67e22; }

        .hand-target {
            position: absolute;
            width: 8.8%; height: 22%;
            top: 45.5%; cursor: pointer;
            z-index: 120;
        }

        .open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open001.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: none;
            z-index: 121;
            background-color: #120e0a; 
            box-shadow: 0 0 20px 8px #120e0a;
            border-radius: 10px;
        }

        .emoji-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 130;
            pointer-events: none;
        }

        .status-badge {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #f1c40f;
            padding: 10px 30px; border-radius: 50px;
            border: 2px solid #f1c40f; z-index: 200;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="soundTakSuccess" src="tak_success.mp3"></audio>
    <audio id="soundFailBreak" src="fail_break.mp3"></audio>
    <audio id="soundWinApplause" src="win_applause.mp3"></audio>
    <audio id="soundJibBat" src="jib_albat.mp3"></audio>

    <div id="navMenu" class="nav-menu" style="display:none;">
        <button class="nav-btn" onclick="showChoiceScreen()">تغيير النمط</button>
        <button class="nav-btn" onclick="backToHome()">الصفحة الرئيسية</button>
    </div>

    <div id="startScreen" class="screen">
        <div class="img-container">
            <img src="start.jpg">
            <div class="hotspot start-btn" onclick="showChoiceScreen()"></div>
        </div>
    </div>
    
    <div id="chooseScreen" class="screen">
        <div class="img-container">
            <img src="choose.jpg">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="status-badge" id="statusText">جاهز للعب؟</div>
        <div class="img-container" id="gameArea">
            <img src="close.jpg">
            <div class="hotspot retry-btn" onclick="initLevel()"></div>
        </div>
    </div>

    <script>
        let ringPos = 0, isOver = false, gameMode = 'tak', takTries = 8;
        const coords = [{l:'2.5%'}, {l:'11.8%'}, {l:'21.2%'}, {l:'30.6%'}, {l:'40%'}, {l:'51.3%'}, {l:'60.7%'}, {l:'70.2%'}, {l:'79.6%'}, {l:'89%'}];

        function playSfx(id) {
            const sound = document.getElementById(id);
            if(sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("تفاعل مطلوب"));
            }
        }

        // العودة للبداية تماماً
        function backToHome() {
            hideAll();
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('navMenu').style.display = 'none';
        }

        function showChoiceScreen() { 
            hideAll(); 
            document.getElementById('chooseScreen').style.display = 'flex'; 
            document.getElementById('navMenu').style.display = 'none';
        }
        
        function startGame(m) { 
            gameMode = m; hideAll(); 
            document.getElementById('gameScreen').style.display = 'flex'; 
            document.getElementById('navMenu').style.display = 'flex'; // إظهار أزرار التنقل
            initLevel(); 
        }

        function hideAll() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); }

        function initLevel() {
            const area = document.getElementById('gameArea');
            area.querySelectorAll('.hand-target').forEach(el => el.remove());
            ringPos = Math.floor(Math.random() * 10);
            isOver = false; takTries = 8;
            updateStatus(gameMode === 'tak' ? "نمط الطك: استبعد 8" : "نمط الجيب: وين المحيبس؟");

            coords.forEach((p, i) => {
                const hand = document.createElement('div');
                hand.className = 'hand-target';
                hand.style.left = p.l;
                const open = document.createElement('div');
                open.className = 'open-view';
                const overlay = document.createElement('div');
                overlay.className = 'emoji-overlay';
                hand.appendChild(open); hand.appendChild(overlay);

                hand.onclick = () => {
                    if (isOver || open.style.display === 'block') return;
                    open.style.display = 'block';

                    if (gameMode === 'jeeb') {
                        if (i === ringPos) { 
                            overlay.innerText = '💍'; updateStatus("بطل! فزت 🎉"); playSfx('soundWinApplause'); 
                        } else { 
                            overlay.innerText = '❌'; updateStatus("بات خسرت! 😢"); playSfx('soundFailBreak'); 
                        }
                        endGame();
                    } else {
                        if (i === ringPos) { 
                            overlay.innerText = '💍'; updateStatus("بات خسرت! 😢"); playSfx('soundFailBreak'); endGame(); 
                        } else {
                            takTries--;
                            if (takTries === 0) { 
                                gameMode = 'jeeb'; updateStatus("بقت ثنين! جيب البات جيبة"); playSfx('soundJibBat'); 
                            } else { 
                                updateStatus(`باقي ${takTries} طكات`); playSfx('soundTakSuccess'); 
                            }
                        }
                    }
                };
                area.appendChild(hand);
            });
        }

        function updateStatus(m) { document.getElementById('statusText').innerText = m; }
        function endGame() { 
            isOver = true; 
            const views = document.querySelectorAll('.open-view'); 
            const overlays = document.querySelectorAll('.emoji-overlay'); 
            views[ringPos].style.display = 'block'; 
            overlays[ringPos].innerText = '💍'; 
        }
    </script>
</body>
</html>
