<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المحيبس الاحترافية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: white;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .image-content {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-content img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }

        /* المناطق الشفافة للضغط */
        .hotspot { position: absolute; cursor: pointer; z-index: 110; }
        .start-btn { bottom: 10%; width: 30%; height: 15%; }
        .tak-btn { bottom: 10%; left: 5%; width: 40%; height: 20%; }
        .jeeb-btn { bottom: 10%; right: 5%; width: 40%; height: 20%; }

        /* واجهة اللعبة */
        #gameScreen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 50px;
        }

        #bgClose {
            max-width: 100vw;
            max-height: 80vh;
            border: 2px solid #333;
        }

        .hand-container {
            position: absolute;
            width: 15%; 
            height: 25%;
            cursor: pointer;
            z-index: 5;
            background: rgba(255, 255, 255, 0.05); 
        }

        .hand-open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open.jpg'); /* تم التأكيد على الامتداد jpg */
            background-size: 500% 200%; 
            display: none;
            z-index: 6;
        }

        .hand-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 10;
            pointer-events: none;
        }

        .game-info {
            position: absolute;
            top: 10px;
            width: 100%;
            z-index: 100;
        }

        .status-badge {
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #f1c40f;
            display: inline-block;
            font-size: 1.1rem;
        }

        .restart-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="fullscreen-container">
        <div class="image-content">
            <img src="start.jpg" onerror="this.src='https://via.placeholder.com/800x600?text=Start+Image+Not+Found'">
            <div class="hotspot start-btn" onclick="showChoice()"></div>
        </div>
    </div>

    <div id="chooseModeScreen" class="fullscreen-container" style="display:none;">
        <div class="image-content">
            <img src="choose.jpg" onerror="this.src='https://via.placeholder.com/800x600?text=Choose+Image+Not+Found'">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen">
        <div class="game-info">
            <div class="status-badge">
                <span id="modeLabel">وضع الطك</span>: <span id="statusMsg">ابدي طك الأيادي!</span>
            </div>
        </div>

        <div class="game-wrapper" id="gameArea">
            <img src="close.jpg" id="bgClose" onerror="this.alt='خطأ: لم يتم العثور على صورة close.jpg'">
        </div>

        <button class="restart-btn" onclick="location.reload()">العودة للقائمة</button>
    </div>

    <script>
        let ringIndex = 0;
        let isGameOver = false;
        let gameMode = 'tak';
        let remainingTak = 8;

        const coords = [
            {t: '25%', l: '10%'}, {t: '25%', l: '28%'}, {t: '25%', l: '46%'}, {t: '25%', l: '64%'}, {t: '25%', l: '82%'},
            {t: '55%', l: '10%'}, {t: '55%', l: '28%'}, {t: '55%', l: '46%'}, {t: '55%', l: '64%'}, {t: '55%', l: '82%'}
        ];

        function showChoice() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('chooseModeScreen').style.display = 'flex';
        }

        function startGame(m) {
            gameMode = m;
            document.getElementById('chooseModeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            initLevel();
        }

        function initLevel() {
            const area = document.getElementById('gameArea');
            ringIndex = Math.floor(Math.random() * 10);
            
            coords.forEach((pos, i) => {
                const container = document.createElement('div');
                container.className = 'hand-container';
                container.style.top = pos.t;
                container.style.left = pos.l;
                
                const openView = document.createElement('div');
                openView.className = 'hand-open-view';
                openView.style.backgroundPosition = `${(i % 5) * 25}% ${(i < 5 ? 0 : 100)}%`;
                
                const overlay = document.createElement('div');
                overlay.className = 'hand-overlay';

                container.appendChild(openView);
                container.appendChild(overlay);
                container.onclick = () => play(i, openView, overlay);
                area.appendChild(container);
            });
        }

        function play(i, view, txt) {
            if (isGameOver || view.style.display === 'block') return;

            view.style.display = 'block';

            if (gameMode === 'jeeb') {
                if (i === ringIndex) {
                    txt.innerText = '💍';
                    msg("بات! بطل لكيت المحيبس 🎉", "#2ecc71");
                } else {
                    txt.innerText = '❌';
                    msg("خسرت! المحيبس مو هنا 😢", "#e74c3c");
                }
                revealAll();
            } else {
                if (i === ringIndex) {
                    txt.innerText = '💍';
                    msg("طاح! طكيت المحيبس بالغلط 😢", "#e74c3c");
                    revealAll();
                } else {
                    remainingTak--;
                    if (remainingTak <= 2) { 
                        gameMode = 'jeeb';
                        msg("بقت بس ثنين! هسه اطلب الجيب", "#f1c40f");
                    } else {
                        msg(`فارغة! باقي لك ${remainingTak - 2} طكات`, "#fff");
                    }
                }
            }
        }

        function msg(m, c) {
            const el = document.getElementById('statusMsg');
            el.innerText = m;
            el.style.color = c;
            document.getElementById('modeLabel').innerText = (gameMode === 'tak' ? "وضع الطك" : "وضع الجيب");
        }

        function revealAll() {
            isGameOver = true;
            const views = document.querySelectorAll('.hand-open-view');
            const overlays = document.querySelectorAll('.hand-overlay');
            views[ringIndex].style.display = 'block';
            overlays[ringIndex].innerText = '💍';
        }
    </script>
</body>
</html>
