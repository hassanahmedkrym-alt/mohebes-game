<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المحيبس - النسخة الصافية</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen { display: flex; }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        .img-container img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        .hotspot { position: absolute; cursor: pointer; z-index: 150; }
        
        /* أزرار الواجهات */
        .start-btn { bottom: 8%; left: 35%; width: 30%; height: 15%; }
        .tak-btn { bottom: 10%; left: 8%; width: 35%; height: 15%; }
        .jeeb-btn { bottom: 10%; right: 8%; width: 35%; height: 15%; }
        .retry-btn { bottom: 5%; left: 32%; width: 36%; height: 10%; }

        .choice-back-btn {
            position: absolute; top: 15px; right: 15px;
            padding: 10px 20px; background: #e67e22;
            color: white; border: 2px solid #f1c40f;
            border-radius: 10px; font-weight: bold;
            z-index: 250; cursor: pointer;
        }

        /* --- تنسيق اليد (بدون مربع أسود) --- */
        .hand-target {
            position: absolute;
            width: 8.8%; 
            height: 22%; 
            top: 45.5%;  
            cursor: pointer;
            z-index: 120;
            background: transparent;
            border: none;
        }

        .open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open1.jpg');
            /* نستخدم 1000% لعرض يد واحدة فقط من الشريط */
            background-size: 1000% 100%; 
            background-repeat: no-repeat;
            display: none;
            z-index: 121;
            /* السحر البرمجي: حذف الخلفية السوداء لليد */
            mix-blend-mode: screen; 
        }

        .emoji-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 130;
            pointer-events: none;
        }

        .status-badge {
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 25px; border-radius: 50px;
            border: 2px solid #f1c40f; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="btnBackToChoice" class="choice-back-btn" style="display:none;" onclick="goBackToChoice()">واجهة الاختيار</div>

    <div id="startScreen" class="screen">
        <div class="img-container">
            <img src="start.jpg">
            <div class="hotspot start-btn" onclick="showChoiceScreen()"></div>
        </div>
    </div>

    <div id="chooseScreen" class="screen">
        <div class="img-container">
            <img src="choose.jpg">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="status-badge" id="statusText">جاهز؟</div>
        <div class="img-container" id="gameArea">
            <img src="close.jpg">
            <div class="hotspot retry-btn" onclick="initLevel()"></div>
        </div>
    </div>

    <script>
        let ringPos = 0, isOver = false, gameMode = 'tak', takTries = 8;
        
        const coords = [
            {l: '4%'}, {l: '13.3%'}, {l: '22.8%'}, {l: '32.2%'}, {l: '41.6%'},
            {l: '51.3%'}, {l: '60.7%'}, {l: '70.2%'}, {l: '79.6%'}, {l: '89%'}
        ];

        function showChoiceScreen() {
            hideAll();
            document.getElementById('chooseScreen').style.display = 'flex';
        }

        function startGame(m) {
            gameMode = m; hideAll();
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('btnBackToChoice').style.display = 'block';
            initLevel();
        }

        function goBackToChoice() {
            hideAll();
            document.getElementById('chooseScreen').style.display = 'flex';
            document.getElementById('btnBackToChoice').style.display = 'none';
        }

        function hideAll() {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        }

        function initLevel() {
            const area = document.getElementById('gameArea');
            area.querySelectorAll('.hand-target').forEach(el => el.remove());
            
            ringPos = Math.floor(Math.random() * 10);
            isOver = false; takTries = 8;
            updateStatus(gameMode === 'tak' ? "استبعد الفارغات" : "اطلب البات");

            coords.forEach((p, i) => {
                const hand = document.createElement('div');
                hand.className = 'hand-target';
                hand.style.left = p.l;
                
                const open = document.createElement('div');
                open.className = 'open-view';
                // إزاحة الشريط لعرض اليد الصحيحة لكل رقم
                open.style.backgroundPosition = `${i * 11.11}% 0%`;
                
                const overlay = document.createElement('div');
                overlay.className = 'emoji-overlay';

                hand.appendChild(open);
                hand.appendChild(overlay);

                hand.onclick = () => {
                    if (isOver || open.style.display === 'block') return;
                    open.style.display = 'block';

                    if (gameMode === 'jeeb') {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("بات! 🎉"); }
                        else { overlay.innerText = '❌'; updateStatus("طاح! 😢"); }
                        endGame();
                    } else {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("خسرت! طكيت البات 😢"); endGame(); }
                        else {
                            takTries--;
                            if (takTries === 0) { gameMode = 'jeeb'; updateStatus("بقت ثنين! اطلب"); }
                            else { updateStatus(`باقي ${takTries} طكات`); }
                        }
                    }
                };
                area.appendChild(hand);
            });
        }

        function updateStatus(m) { document.getElementById('statusText').innerText = m; }
        function endGame() { 
            isOver = true; 
            const views = document.querySelectorAll('.open-view');
            const overlays = document.querySelectorAll('.emoji-overlay');
            views[ringPos].style.display = 'block';
            overlays[ringPos].innerText = '💍';
        }
    </script>
</body>
</html>
