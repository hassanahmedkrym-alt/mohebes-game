<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المحيبس - ضبط المحاذاة</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
            margin: 0; padding: 0;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen { display: flex; }

        .img-container {
            position: relative;
            width: 100%; height: 100%;
        }

        .img-container img {
            width: 100%; height: 100%;
            object-fit: fill; /* تملأ الشاشة بالكامل */
            display: block;
        }

        .hotspot { position: absolute; cursor: pointer; z-index: 150; }
        
        /* أزرار الواجهات */
        .start-btn { bottom: 8%; left: 35%; width: 30%; height: 15%; }
        .tak-btn { bottom: 10%; left: 10%; width: 35%; height: 15%; }
        .jeeb-btn { bottom: 10%; right: 10%; width: 35%; height: 15%; }
        .retry-btn { bottom: 5%; left: 32%; width: 36%; height: 10%; }

        /* زر العودة */
        .choice-back-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: #e67e22;
            color: white; border: 2px solid #f1c40f;
            border-radius: 10px; font-weight: bold;
            z-index: 250; cursor: pointer;
        }

        /* --- أهم جزء: تنسيق الأيادي --- */
        .hand-target {
            position: absolute;
            width: 8.4%; /* عرض اليد الواحدة تقريباً */
            height: 20%; /* طول منطقة اليد */
            top: 45.5%;  /* الارتفاع عن أعلى الشاشة */
            cursor: pointer;
            z-index: 120;
            /* background: rgba(255, 0, 0, 0.3); /* افصل هذا السطر لرؤية المربعات وضبطها */
        }

        .open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open.jpg');
            background-size: 1190% 100%; /* تكبير الصورة لتغطية الـ 10 أيادي */
            background-repeat: no-repeat;
            display: none;
            z-index: 121;
        }

        .emoji-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            z-index: 130;
            pointer-events: none;
        }

        .info-bar {
            position: absolute; top: 15px; width: 100%;
            z-index: 200; pointer-events: none;
        }

        .status-badge {
            background: rgba(0,0,0,0.85);
            padding: 8px 25px; border-radius: 50px;
            border: 2px solid #f1c40f; display: inline-block;
        }
    </style>
</head>
<body>

    <div id="backChoiceBtn" class="choice-back-btn" style="display:none;" onclick="returnToChoice()">واجهة الاختيار</div>

    <div id="startScreen" class="screen">
        <div class="img-container">
            <img src="start.jpg">
            <div class="hotspot start-btn" onclick="goToChoice()"></div>
        </div>
    </div>

    <div id="chooseScreen" class="screen">
        <div class="img-container">
            <img src="choose.jpg">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="info-bar"><div class="status-badge" id="statusText">تحضّر..</div></div>
        <div class="img-container" id="gameArea">
            <img src="close.jpg">
            <div class="hotspot retry-btn" onclick="resetCurrentLevel()"></div>
        </div>
    </div>

    <script>
        let ringPos = 0, isOver = false, gameMode = 'tak', takTries = 8;
        
        // إحداثيات مدروسة لـ 10 أيادي بالعرض
        const coords = [
            {l: '4.5%'}, {l: '13.8%'}, {l: '23.2%'}, {l: '32.6%'}, {l: '42%'},
            {l: '51.4%'}, {l: '60.8%'}, {l: '70.2%'}, {l: '79.6%'}, {l: '89%'}
        ];

        function goToChoice() { hideAll(); document.getElementById('chooseScreen').style.display = 'flex'; }

        function startGame(m) {
            gameMode = m; hideAll();
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('backChoiceBtn').style.display = 'block';
            resetCurrentLevel();
        }

        function returnToChoice() { hideAll(); document.getElementById('chooseScreen').style.display = 'flex'; document.getElementById('backChoiceBtn').style.display = 'none'; }

        function hideAll() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('chooseScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
        }

        function resetCurrentLevel() {
            const area = document.getElementById('gameArea');
            area.querySelectorAll('.hand-target').forEach(el => el.remove());
            ringPos = Math.floor(Math.random() * 10);
            isOver = false; takTries = 8;
            updateStatus(gameMode === 'tak' ? "وضع الطك: باقي 8" : "وضع الجيب: وين المحيبس؟");

            coords.forEach((p, i) => {
                const hand = document.createElement('div');
                hand.className = 'hand-target';
                hand.style.left = p.l;
                
                const open = document.createElement('div');
                open.className = 'open-view';
                // استخدام الـ background-position كـ Sprite Sheet
                open.style.backgroundPosition = `${i * 11.1}% 0%`;
                
                const overlay = document.createElement('div');
                overlay.className = 'emoji-overlay';

                hand.appendChild(open);
                hand.appendChild(overlay);

                hand.onclick = () => {
                    if (isOver || open.style.display === 'block') return;
                    open.style.display = 'block';
                    if (gameMode === 'jeeb') {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("بات! 🎉"); }
                        else { overlay.innerText = '❌'; updateStatus("خسرت! 😢"); }
                        endGame();
                    } else {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("خسرت! طكيت المحيبس 😢"); endGame(); }
                        else {
                            takTries--;
                            if (takTries === 0) { gameMode = 'jeeb'; updateStatus("بقت إيدين! هسه اطلب"); }
                            else { updateStatus(`باقي ${takTries} طكات`); }
                        }
                    }
                };
                area.appendChild(hand);
            });
        }

        function updateStatus(m) { document.getElementById('statusText').innerText = m; }
        function endGame() { 
            isOver = true; 
            const views = document.querySelectorAll('.open-view');
            const overlays = document.querySelectorAll('.emoji-overlay');
            views[ringPos].style.display = 'block';
            overlays[ringPos].innerText = '💍';
        }
    </script>
</body>
</html>
