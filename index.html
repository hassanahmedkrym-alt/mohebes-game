<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <title>لعبة المحيبس - النسخة النهائية</title>
    <style>
        /* إعدادات تصفير الشاشة */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            touch-action: none; /* منع الزووم اللمسي */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* الحاوية الرئيسية مثبتة تماماً على أبعاد الشاشة */
        #mainWrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100dvw; 
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* تدوير ذكي لملء الشاشة في وضع العمود (Portrait) */
        @media screen and (orientation: portrait) {
            #mainWrapper {
                transform: rotate(90deg);
                transform-origin: center center;
                width: 100dvh !important;
                height: 100dvw !important;
            }
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen { display: flex; }

        .img-container {
            position: relative;
            width: 100%; height: 100%;
            display: block;
        }

        .img-container img {
            width: 100% !important;
            height: 100% !important;
            /* التعديل الأهم: fill تجبر الصورة على مط نفسها لملء كل الفراغات */
            object-fit: fill !important; 
            position: absolute;
            top: 0; left: 0;
        }

        /* الأزرار العلوية مع مراعاة حواف النوتش */
        .nav-menu {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            left: env(safe-area-inset-left, 15px);
            display: flex; gap: 10px;
            z-index: 250;
        }

        .nav-btn {
            padding: 10px 18px;
            background: rgba(211, 84, 0, 0.9);
            color: white; border: 1.5px solid #f1c40f;
            border-radius: 8px; font-size: 0.8rem;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hand-target {
            position: absolute;
            width: 8.8%; height: 22%;
            top: 45.5%; cursor: pointer;
            z-index: 120;
        }

        .open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open001.png');
            background-size: 100% 100%;
            display: none;
            z-index: 121;
            background-color: #120e0a;
            box-shadow: 0 0 15px 8px #120e0a;
        }

        .emoji-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 130;
            pointer-events: none;
        }

        .status-badge {
            position: absolute; 
            top: env(safe-area-inset-top, 15px); 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #f1c40f; padding: 8px 30px;
            border-radius: 50px; border: 2px solid #f1c40f;
            z-index: 200; font-size: 1rem; font-weight: bold;
            white-space: nowrap;
        }

        .hotspot { position: absolute; cursor: pointer; z-index: 150; }
        .start-btn { bottom: 8%; left: 35%; width: 30%; height: 15%; }
        .tak-btn { bottom: 10%; left: 8%; width: 35%; height: 15%; }
        .jeeb-btn { bottom: 10%; right: 8%; width: 35%; height: 15%; }
        .retry-btn { bottom: 5%; left: 32%; width: 36%; height: 10%; }
    </style>
</head>
<body>

    <div id="mainWrapper">
        <audio id="soundTakSuccess" src="tak_success.mp3"></audio>
        <audio id="soundFailBreak" src="fail_break.mp3"></audio>
        <audio id="soundWinApplause" src="win_applause.mp3"></audio>
        <audio id="soundJibBat" src="jib_albat.mp3"></audio>

        <div id="navMenu" class="nav-menu" style="display:none;">
            <button class="nav-btn" onclick="showChoiceScreen()">تغيير النمط</button>
            <button class="nav-btn" onclick="backToHome()">الرئيسية</button>
        </div>

        <div id="startScreen" class="screen">
            <div class="img-container">
                <img src="start.jpg">
                <div class="hotspot start-btn" onclick="showChoiceScreen()"></div>
            </div>
        </div>
        
        <div id="chooseScreen" class="screen">
            <div class="img-container">
                <img src="choose.jpg">
                <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
                <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div class="status-badge" id="statusText">محيبس العراق - جاهز؟</div>
            <div class="img-container" id="gameArea">
                <img src="close.jpg">
                <div class="hotspot retry-btn" onclick="initLevel()"></div>
            </div>
        </div>
    </div>

    <script>
        let ringPos = 0, isOver = false, gameMode = 'tak', takTries = 8;
        const coords = [{l:'2.5%'}, {l:'11.8%'}, {l:'21.2%'}, {l:'30.6%'}, {l:'40%'}, {l:'51.3%'}, {l:'60.7%'}, {l:'70.2%'}, {l:'79.6%'}, {l:'89%'}];

        function playSfx(id) {
            const sound = document.getElementById(id);
            if(sound) { sound.currentTime = 0; sound.play().catch(e => {}); }
        }

        function backToHome() { hideAll(); document.getElementById('startScreen').style.display = 'flex'; document.getElementById('navMenu').style.display = 'none'; }
        function showChoiceScreen() { hideAll(); document.getElementById('chooseScreen').style.display = 'flex'; document.getElementById('navMenu').style.display = 'none'; }
        function hideAll() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); }

        function startGame(m) { 
            gameMode = m; hideAll(); 
            document.getElementById('gameScreen').style.display = 'flex'; 
            document.getElementById('navMenu').style.display = 'flex';
            initLevel(); 
        }

        function initLevel() {
            const area = document.getElementById('gameArea');
            area.querySelectorAll('.hand-target').forEach(el => el.remove());
            ringPos = Math.floor(Math.random() * 10);
            isOver = false; takTries = 8;
            updateStatus(gameMode === 'tak' ? "نمط الطك: استبعد 8" : "نمط الجيب: اطلب البات");

            coords.forEach((p, i) => {
                const hand = document.createElement('div');
                hand.className = 'hand-target';
                hand.style.left = p.l;
                const open = document.createElement('div');
                open.className = 'open-view';
                const overlay = document.createElement('div');
                overlay.className = 'emoji-overlay';
                hand.appendChild(open); hand.appendChild(overlay);

                hand.onclick = () => {
                    if (isOver || open.style.display === 'block') return;
                    open.style.display = 'block';
                    if (gameMode === 'jeeb') {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("بطل! فزت 🎉"); playSfx('soundWinApplause'); }
                        else { overlay.innerText = '❌'; updateStatus("بات خسرت! 😢"); playSfx('soundFailBreak'); }
                        endGame();
                    } else {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("خسرت! طكيت المحيبس 😢"); playSfx('soundFailBreak'); endGame(); }
                        else {
                            takTries--;
                            if (takTries === 0) { gameMode = 'jeeb'; updateStatus("بقت ثنين! جيب البات جيبة"); playSfx('soundJibBat'); }
                            else { updateStatus(`باقي ${takTries} طكات`); playSfx('soundTakSuccess'); }
                        }
                    }
                };
                area.appendChild(hand);
            });
        }

        function updateStatus(m) { document.getElementById('statusText').innerText = m; }
        function endGame() { isOver = true; const views = document.querySelectorAll('.open-view'); const overlays = document.querySelectorAll('.emoji-overlay'); views[ringPos].style.display = 'block'; overlays[ringPos].innerText = '💍'; }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    // إجبار التحديث إذا وجد نسخة جديدة
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                location.reload();
                            }
                        };
                    };
                });
            });
        }
    </script>
</body>
</html>
